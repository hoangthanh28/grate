# This is alight weight build and test, suitable for rapid checks of commits on feature branches etc.
name: CI

on: 
  push: # Trigger on pushes to feature branches for safety before a PR
    branches-ignore:
      - main # don't run on main (build.yml handles that)
    paths-ignore:
      - docs/
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-code:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET 10 and earlier
      uses: actions/setup-dotnet@v5
      with:
         dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Restore dependencies
      run: |
       dotnet restore -r linux-x64 grate.sln
    - name: Build
      run: dotnet build --no-restore --no-self-contained -r linux-x64 src/grate/grate.csproj -c release


  analyze:
    name: Analyze Code Security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Setup .NET 10 and earlier
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      
  test:
    name: Run tests

    runs-on: ubuntu-latest
    #needs: build-code

    strategy:
      fail-fast: false
      matrix:
        category: [ "Basic_tests", "SqlServer", "SqlServerCaseSensitive", "PostgreSQL", "MariaDB", "Sqlite", "Oracle"  ]
        #category: [ "Basic_tests", "Sqlite"  ]

    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET 10 and earlier
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Test
      run: |
        dotnet test \
        --project unittests/${{ matrix.category }} \
        --coverage \
        --coverage-output-format xml \
        --coverage-output /tmp/test-results/${{ matrix.category }}.xml
      env:
        LogLevel: Warning
        TZ: UTC

    - name: Upload Unit Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: "${{ matrix.category }} XML test results"
        path: |
          /tmp/test-results/${{ matrix.category }}.xml
        retention-days: 1


  report:
     runs-on: ubuntu-latest
     name: Create test report
     needs: test
     if: always()

     steps:
      - name: Download XML test reports
        uses: actions/download-artifact@v8
        with:
          path: test-results

      - name: Setup .NET # Required to execute ReportGenerator
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Create HTML test report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: 'test-results/**/*.xml'
          targetdir: 'test-outputs' # REQUIRED # The directory where the generated report should be saved.
          reporttypes: 'HtmlInline;Cobertura' # The output formats and scope (separated by semicolon) Values: Badges, Clover, Cobertura, OpenCover, CsvSummary, Html, Html_Dark, Html_Light, Html_BlueRed, HtmlChart, HtmlInline, HtmlInline_AzurePipelines, HtmlInline_AzurePipelines_Dark, HtmlInline_AzurePipelines_Light, HtmlSummary, Html_BlueRed_Summary, JsonSummary, Latex, LatexSummary, lcov, MarkdownSummary, MarkdownSummaryGithub, MarkdownDeltaSummary, MHtml, SvgChart, SonarQube, TeamCitySummary, TextSummary, TextDeltaSummary, Xml, XmlSummary
          sourcedirs: '' # Optional directories which contain the corresponding source code (separated by semicolon). The source directories are used if coverage report contains classes without path information.
          historydir: '' # Optional directory for storing persistent coverage information. Can be used in future reports to show coverage evolution.
          workingdir: '' # Optional working directory. If available, the targetdir, sourcedirs and historydir are interpreted relative to the working directory (only if not specified as absolute paths).'
          plugins: '' # Optional plugin files for custom reports or custom history storage (separated by semicolon).
          assemblyfilters: '+*' # Optional list of assemblies that should be included or excluded in the report. Exclusion filters take precedence over inclusion filters. Wildcards are allowed.
          classfilters: '+*' # Optional list of classes that should be included or excluded in the report. Exclusion filters take precedence over inclusion filters. Wildcards are allowed.
          filefilters: '+*' # Optional list of files that should be included or excluded in the report. Exclusion filters take precedence over inclusion filters. Wildcards are allowed.
          verbosity: 'Info' # The verbosity level of the log messages. Values: Verbose, Info, Warning, Error, Off
          title: 'grate unit tests' # Optional title.
          tag: '${{ github.run_number }}_${{ github.run_id }}' # Optional tag or build version.
          license: '' # Optional license for PRO version. Get your license here: https://reportgenerator.io/pro
          customSettings: '' # Optional custom settings (separated by semicolon). See: https://github.com/danielpalme/ReportGenerator/wiki/Settings.
          toolpath: 'reportgeneratortool' # Default directory for installing the dotnet tool.

